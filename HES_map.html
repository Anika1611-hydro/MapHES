<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта: гидротехнические сооружения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 42px;
            padding: 24px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 1px 2px rgba(255, 255, 255, 0.08);
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #e3f0f5;
            text-shadow: 0 2px 5px #00000050;
            margin-left: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #2f454e;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 400;
            color: #bfdde5;
            border: 1px solid #5e7b86;
            box-shadow: inset 0 1px 3px #ffffff20, 0 6px 12px #00000040;
        }
        .counter-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 24px;
            margin-bottom: 28px;
            padding: 0 10px;
        }
        .counter-block {
            background: #1f2f38;
            border-radius: 48px;
            padding: 14px 32px;
            border: 1px solid #457281;
            box-shadow: 0 10px 18px #00000060, inset 0 2px 3px #9bbac750;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(4px);
            min-width: 200px;
        }
        .counter-label {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #a3c9d9;
            letter-spacing: 1.2px;
            font-weight: 300;
        }
        .counter-value {
            font-size: 2.6rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #f2ffe6;
            text-shadow: 0 0 8px #6effb0;
            background: #00000030;
            padding: 0 14px;
            border-radius: 40px;
            line-height: 1.3;
            border: 1px solid #688c9b;
        }
        .map-container {
            border-radius: 32px;
            overflow: hidden;
            border: 2px solid #4b6f80;
            box-shadow: 0 20px 35px #00000080, 0 0 0 1px #98c1d1 inset;
            background: #17232a;
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }
        .footnote {
            text-align: right;
            color: #7b9fad;
            margin-top: 18px;
            padding: 0 16px;
            font-size: 0.95rem;
            font-style: italic;
            border-top: 1px dashed #3f5d68;
            padding-top: 18px;
        }
        .footnote a {
            color: #c0e2f0;
            text-decoration: none;
            border-bottom: 1px dotted;
        }
        .footnote a:hover {
            color: white;
        }
        .counter-error {
            color: #ff9e9e;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        @media (max-width: 700px) {
            .card { padding: 16px; }
            h1 { font-size: 1.8rem; }
            .counter-block { padding: 10px 20px; gap: 8px; }
            .counter-label { font-size: 1rem; }
            .counter-value { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        Интерактивная карта: гидротехнические сооружения
        <span>live‑чертёж</span>
    </h1>

    <!-- Двойной глобальный счётчик посещений: сегодня и всего -->
    <div class="counter-panel" id="counterPanel">
        <div class="counter-block">
            <span class="counter-label">👥 Сегодня</span>
            <span class="counter-value" id="todayCount">⏳</span>
        </div>
        <div class="counter-block">
            <span class="counter-label">🌍 Всего</span>
            <span class="counter-value" id="totalCount">⏳</span>
        </div>
    </div>

    <!-- Интерактивная карта с автоматическим обновлением -->
    <div class="map-container">
        <iframe 
            src="https://www.scribblemaps.com/maps/view/ГЭСки/7xbYJEmDdV" 
            allowfullscreen 
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Карта ГЭСки">
        </iframe>
    </div>

    <div class="footnote">
        🧭 карта обновляется автоматически · данные с Scribble Maps · 
        <a href="https://www.scribblemaps.com/maps/view/ГЭСки/7xbYJEmDdV" target="_blank">открыть в новой вкладке</a>
    </div>
</div>

<script>
    // Простой и надежный счетчик посещений на localStorage
    (function() {
        // Функция для обновления счетчика
        function updateCounter() {
            const counterElement = document.getElementById('visitCounter');
            if (!counterElement) return; // Если элемент не найден, выходим

            try {
                // Пытаемся получить текущее значение счетчика
                let visits = localStorage.getItem('pageVisits');

                if (visits === null) {
                    // Первое посещение
                    visits = 1;
                } else {
                    // Увеличиваем счетчик
                    visits = parseInt(visits) + 1;
                    // Проверка на NaN (на всякий случай)
                    if (isNaN(visits)) {
                        visits = 1;
                    }
                }

                // Сохраняем новое значение
                localStorage.setItem('pageVisits', visits);
                // Показываем значение на странице
                counterElement.textContent = visits;
                console.log('Счетчик обновлен:', visits); // Для отладки
            } catch (e) {
                // Если localStorage недоступен (например, в режиме инкогнито)
                console.error('Ошибка счетчика:', e);
                counterElement.textContent = '—';
            }
        }

        // Функция для обновления даты
        function updateLastVisitDate() {
            const dateElement = document.getElementById('lastUpdate');
            if (!dateElement) return;

            try {
                const now = new Date();
                const options = {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                };
                dateElement.textContent = now.toLocaleString('ru-RU', options);
            } catch (e) {
                dateElement.textContent = new Date().toString();
            }
        }

        // Запускаем всё после полной загрузки страницы
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                updateCounter();
                updateLastVisitDate();
            });
        } else {
            // Если DOM уже загружен
            updateCounter();
            updateLastVisitDate();
        }
    })();
</script>

<!-- Инструкция по сбросу счетчика (можно удалить или оставить как подсказку) -->
<div style="display: none;">
    <!-- Для сброса счетчика перейдите по ссылкам:
    Всего: https://api.countapi.xyz/set/geski/total-visits?value=0
    Сегодня: https://api.countapi.xyz/set/geski-daily/daily-visits?value=0
    -->
</div>
</body>

</html>
