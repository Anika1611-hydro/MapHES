<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Прокси для карты</title>
</head>
<body>
    <div id="map"></div>
    
    <!-- Подключаем API Scribble Maps -->
    <script src="https://www.scribblemaps.com/api/js/8.0/"></script>
    
    <script>
        // Создаем карту напрямую через API, если это возможно
        // Это альтернативный подход - не через iframe, а через API
        
        // Проверяем, загрузилось ли API
        if (typeof ScribbleMaps !== 'undefined') {
            // Инициализируем карту с ID вашей карты
            var mapOptions = {
                mapId: '7xbYJEmDdV', // ID вашей карты
                container: document.getElementById('map')
            };
            
            // Создаем карту
            var map = new ScribbleMaps.Map(mapOptions);
        } else {
            document.getElementById('map').innerHTML = 
                '<p>Загрузка карты... Если карта не загружается, <a href="https://www.scribblemaps.com/maps/view/ГЭСки/7xbYJEmDdV" target="_blank">откройте её напрямую</a></p>';
        }
    </script>
    
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 600px; }
    </style>
</body>
</html>
